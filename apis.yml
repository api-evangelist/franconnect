name: FranConnect
kind: company
description: FranConnect is a franchise and multi-location management platform used
  by 1,500+ brands across roughly one million locations, covering franchise
  development and sales, franchisee/unit information management, field operations
  and audits, financials and royalties, and CRM. Its FranConnect Sky product
  exposes a RESTful API - organized by module (Franchise Sales "fs", CRM "cm", Info
  Manager "fim", Finance "manage-finance", and Admin "admin") - that lets customers
  import and export data between FranConnect Sky and third-party applications. All
  API calls are made over HTTPS and authenticated with an Authorization-Token
  header. API access is not open/self-serve - it is gated behind a FranConnect Sky
  customer or partner account, with credentials provisioned by FranConnect, and the
  reference documentation portal (docs.franconnect.net) requires a signed-in
  account.
