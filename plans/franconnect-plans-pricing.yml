description: >-
  FranConnect does not publish transparent, self-serve pricing. It is sold as an
  enterprise franchise/multi-location management platform via a sales-led motion:
  prospects request a demo and receive a customized quote. Third-party software
  directories report pricing that starts around $49 per user per month, with
  typical monthly subscriptions ranging roughly $1,000-$2,000/month depending on
  brand size, modules (Development, Operations, Field Visits, Marketing,
  Financials, CRM), and number of locations. The API is included as part of a
  FranConnect Sky subscription for customers/partners rather than sold as a
  standalone metered product; there is no public API-usage price list.
notes: >-
  Figures are from third-party software directories (Software Finder,
  SoftwareSuggest, Capterra) and are NOT confirmed by FranConnect. Actual pricing
  is quote-based. Verify current terms directly with FranConnect sales during
  reconciliation. No public per-call or per-record API pricing is documented.
sources:
- https://www.franconnect.com/en/
- https://marketplace.franconnect.net/api-detail.html
- https://softwarefinder.com/crm/franconnect
- https://www.softwaresuggest.com/fran-connect
